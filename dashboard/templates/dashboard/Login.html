{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CostLens</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f3f4f6;
}

.login-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.brand{
    font-size:18px;
    font-weight:700;
    color:#2563eb;
    margin-bottom:10px;
}

h1{
    margin:0;
    color:#2563eb;
    font-size:42px;
    font-weight:800;
}

.subtitle{
    color:#666;
    margin-top:10px;
    margin-bottom:30px;
    font-size:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#222;
}

input{
    width:100%;
    padding:16px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    background:#e8edf5;
    margin-bottom:20px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.signup{
    text-align:center;
    margin-top:22px;
    color:#666;
}

.signup a{
    color:#2563eb;
    text-decoration:none;
    font-weight:700;
}
</style>
</head>

<body>

<div class="login-container">
    <div class="login-box">

        <div class="brand">CostLens</div>

        <h1>Welcome Back</h1>
        <div class="subtitle">Login to continue to your dashboard.</div>

        <form method="POST">
            {% csrf_token %}

            <label>Username:</label>
            <input type="text" name="username" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <div class="signup">
            Don’t have an account?
            <a href="{% url 'signup' %}">Sign up</a>
        </div>

    </div>
</div>

</body>
</html>
