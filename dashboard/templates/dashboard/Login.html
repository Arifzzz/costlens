{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - CostLens</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f7f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-box {
            width: 100%;
            max-width: 460px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            border: 1px solid #e5e7eb;
            overflow: visible;
        }

        .auth-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .auth-logo img {
            display: block;
            width: 220px;
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .auth-logo img:hover {
            transform: scale(1.05) rotate(-2deg);
            filter: drop-shadow(0 8px 18px rgba(37, 99, 235, 0.22));
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #2563eb;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 25px;
        }

        form p {
            text-align: left;
            margin-bottom: 15px;
            color: #111827;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
        }

        button {
            width: 100%;
            border: none;
            background: #2563eb;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .bottom-link {
            text-align: center;
            margin-top: 18px;
            color: #6b7280;
        }

        .bottom-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        ul.errorlist {
            color: red;
            padding-left: 20px;
            margin-bottom: 10px;
        }

        @media (max-width: 520px) {
            .auth-box {
                max-width: 92%;
                padding: 26px;
            }

            .auth-logo img {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="auth-logo">
            <img src="{% static 'dashboard/images/costlens-logo.png' %}" alt="CostLens Logo">
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Login to continue to your dashboard.</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <div class="bottom-link">
            Don’t have an account? <a href="{% url 'signup' %}">Sign up</a>
        </div>
    </div>
</body>
</html>
