<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile - CostLens</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        body { background: #f7f7f9; color: #111827; }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #2563eb;
            letter-spacing: 0.5px;
        }

        .nav-links { display: flex; gap: 16px; }

        .nav-links a {
            text-decoration: none;
            color: #111827;
            padding: 10px 18px;
            border-radius: 18px;
            font-weight: 600;
        }

        .profile-dropdown { position: relative; }

        .profile-dropdown::after {
            content: "";
            position: absolute;
            top: 100%;
            width: 100%;
            height: 12px;
        }

        .profile-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            min-width: 180px;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.10);
        }

        .dropdown-menu a {
            display: block;
            padding: 12px 16px;
            text-decoration: none;
            color: #111827;
            font-weight: 600;
        }

        .dropdown-menu a:hover { background: #f3f4f6; }

        .profile-dropdown:hover .dropdown-menu { display: block; }

        .page {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 { font-size: 40px; margin-bottom: 20px; }

        .box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }

        .box h2 { margin-bottom: 18px; font-size: 24px; }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #eef4ff;
            border: 1px solid #bfd1ff;
            color: #2563eb;
            border-radius: 12px;
            font-weight: 600;
        }

        form p { margin-bottom: 14px; }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
        }

        button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        ul.errorlist {
            margin: 6px 0 10px 18px;
            color: #dc2626;
        }

        .helptext {
            display: block;
            margin-top: 4px;
            color: #6b7280;
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .navbar {
                flex-direction: column;
                gap: 16px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo">CostLens</div>

    <div class="nav-links">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'budget' %}">Budget</a>
        <a href="{% url 'cost_of_living' %}">Cost of Living</a>
    </div>

    <div class="profile-dropdown">
        <button class="profile-btn">{{ request.user.username }} ▾</button>
        <div class="dropdown-menu">
            <a href="{% url 'profile' %}">Account</a>
            <a href="{% url 'history' %}">History</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
</nav>

<div class="page">
    <h1>Profile</h1>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <div class="box">
        <h2>Account Details</h2>

        <form method="POST">
            {% csrf_token %}
            {{ user_form.as_p }}
            <button type="submit" name="update_details">Save Details</button>
        </form>
    </div>

    <div class="box">
        <h2>Change Password</h2>

        <form method="POST">
            {% csrf_token %}
            {{ password_form.as_p }}
            <button type="submit" name="change_password">Update Password</button>
        </form>
    </div>
</div>

</body>
</html>
