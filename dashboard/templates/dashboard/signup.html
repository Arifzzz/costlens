{% load static %} <!-- Loads Django static files if needed later -->
<!DOCTYPE html> <!-- Declares this as an HTML5 document -->
<html lang="en"> <!-- Main HTML element with English language set -->
<head>
    <meta charset="UTF-8" /> <!-- Supports standard text characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Makes page responsive on mobile -->
    <title>Sign Up - CostLens</title> <!-- Browser tab title -->

    <style>
        *{
            box-sizing:border-box; /* Makes width and height easier to control */
            font-family:Arial, sans-serif; /* Main font used across page */
        }

        body{
            margin:0; /* Removes default browser margin */
            background:#f7f7f9; /* Light background colour */
            display:flex; /* Uses flexbox for centering */
            justify-content:center; /* Centers content horizontally */
            align-items:center; /* Centers content vertically */
            min-height:100vh; /* Makes page fill full screen height */
        }

        .auth-box{
            width:100%; /* Allows box to scale */
            max-width:460px; /* Prevents form box from becoming too wide */
            background:white; /* White card background */
            padding:35px; /* Inner spacing */
            border-radius:20px; /* Rounded corners */
            box-shadow:0 10px 25px rgba(0,0,0,0.06); /* Soft shadow effect */
            border:1px solid #e5e7eb; /* Light border */
        }

        .brand{
            text-align:center; /* Centers brand text */
            color:#2563eb; /* Blue brand colour */
            font-size:18px; /* Brand text size */
            font-weight:700; /* Bold text */
            margin-bottom:14px; /* Space below brand */
        }

        h1{
            text-align:center; /* Centers heading */
            margin:0 0 10px 0; /* Removes top margin and adds bottom spacing */
            color:#2563eb; /* Blue heading colour */
            font-size:48px; /* Large heading size */
            font-weight:800; /* Extra bold heading */
        }

        .subtitle{
            text-align:center; /* Centers subtitle */
            color:#6b7280; /* Softer grey text */
            margin-bottom:25px; /* Space below subtitle */
            font-size:18px; /* Subtitle text size */
        }

        form p{
            text-align:left; /* Aligns form fields to the left */
            margin-bottom:15px; /* Space below each form field */
            color:#111827; /* Dark text colour */
        }

        label{
            font-weight:600; /* Semi-bold label text */
        }

        input{
            width:100%; /* Full width input fields */
            padding:12px; /* Space inside inputs */
            margin-top:6px; /* Space above input */
            border:1px solid #d1d5db; /* Light border */
            border-radius:10px; /* Rounded corners */
            font-size:15px; /* Input text size */
        }

        button{
            width:100%; /* Full width button */
            border:none; /* Removes default button border */
            background:#2563eb; /* Main blue button */
            color:white; /* White button text */
            padding:14px; /* Space inside button */
            border-radius:12px; /* Rounded corners */
            font-size:16px; /* Button text size */
            font-weight:700; /* Bold button text */
            cursor:pointer; /* Shows clickable pointer */
            margin-top:14px; /* Space above button */
        }

        button:hover{
            background:#1d4ed8; /* Darker blue on hover */
        }

        .bottom-link{
            text-align:center; /* Centers bottom text */
            margin-top:18px; /* Space above bottom link */
            color:#6b7280; /* Softer grey text */
        }

        .bottom-link a{
            color:#2563eb; /* Blue link colour */
            text-decoration:none; /* Removes underline */
            font-weight:600; /* Semi-bold link text */
        }

        ul.errorlist{
            color:red; /* Shows validation errors in red */
            padding-left:20px; /* Adds spacing on the left */
            margin-bottom:10px; /* Space below errors */
        }

        .helptext{
            display:block; /* Places help text on its own line */
            font-size:13px; /* Smaller help text size */
            color:#6b7280; /* Soft grey colour */
            margin-top:4px; /* Small gap above help text */
        }

        @media (max-width:520px){
            .auth-box{
                max-width:92%; /* Makes box fit smaller screens better */
                padding:26px; /* Slightly smaller padding on mobile */
            }

            h1{
                font-size:40px; /* Reduces heading size on smaller screens */
            }
        }
    </style>
</head>

<body>

<div class="auth-box"> <!-- Main signup card -->

    <div class="brand">CostLens</div> <!-- Website brand name -->

    <h1>Create Account</h1> <!-- Main page heading -->
    <p class="subtitle">Sign up to access your CostLens dashboard.</p> <!-- Short helper text -->

    <form method="POST"> <!-- Sends signup data to Django backend -->
        {% csrf_token %} <!-- Security token to protect form submission -->
        {{ form.as_p }} <!-- Renders Django signup form as paragraphs -->
        <button type="submit">Sign Up</button> <!-- Submit button -->
    </form>

    <div class="bottom-link"> <!-- Login redirect section -->
        Already have an account?
        <a href="{% url 'login' %}">Login</a> <!-- Link to login page -->
    </div>

</div>

</body>
</html>
